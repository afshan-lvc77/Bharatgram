<!DOCTYPE html>
<html>
<head>
    <title>Profile | Bharatgram</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <div class="profile-header">
    <img id="profile-img" src="https://via.placeholder.com/80" style="border-radius: 50%;">
    <h2 id="profile-username">Loading...</h2>
    <button onclick="logout()">Logout</button>

    <!-- Ye sab header ke andar hona chahiye -->
    <div class="stats-container" style="display:flex; gap:20px; margin-top:10px;">
        <span><strong id="follower-count">0</strong> Followers</span>
        <span><strong id="following-count">0</strong> Following</span>
    </div>
    
    <div class="profile-actions" style="display: flex; gap: 10px; margin-top: 10px;">
    <button id="follow-btn" class="follow-btn-style">Follow</button>
    <button id="msg-btn" class="msg-btn-style">Message</button>
</div>
    
    <!-- Bottom Nav wahi purana wala copy-paste kar dena yahan -->
    
    <script type="module" src="../js/profile.js"></script>
</body>
</html>
