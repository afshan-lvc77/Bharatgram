<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharatgram</title>
    <link rel="stylesheet" href="css/main.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Top Navigation -->
    <nav class="top-nav">
        <h1 class="logo">Bharatgram</h1>
        <div class="nav-icons">
            <i class="fa-regular fa-heart"></i>
            <i class="fa-regular fa-paper-plane"></i>
        </div>
    </nav>

    <!-- Main Feed Section -->
    <main id="feed-container">
        <!-- Posts yahan auto-load hongi JS se -->
        <div class="loading-msg">Fetching your feed...</div>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <i class="fa-solid fa-house"></i>
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-regular fa-square-plus" id="add-post-btn"></i>
        <i class="fa-solid fa-clapperboard"></i>
        <img src="https://via.placeholder.com/30" id="user-profile-icon" class="nav-profile-pic">
    </nav>

    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/post.js"></script>
    <script type="module" src="js/auth.js"></script>

<!-- Post Upload Modal -->
<div id="post-modal" style="display:none; position:fixed; top:0; background:white; width:100%; height:100%; z-index:200; padding:20px; box-sizing:border-box;">
    <h3>Create New Post</h3>
    <input type="file" id="file-input" accept="image/*">
    <br><br>
    <textarea id="caption-input" placeholder="Write a caption..." style="width:100%; height:100px;"></textarea>
    <br><br>
    <button id="upload-btn">Share Post</button>
    <button onclick="document.getElementById('post-modal').style.display='none'">Cancel</button>
</div>

</body>
</html>
